<div class="dashboard-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon"></div>
      <div><div class="logo-text">ASCENDIFY</div><div class="logo-sub">Super Admin (S-OS)</div></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-title">Platform</div>
      <nav class="sidebar-nav">
        <a routerLink="/superadmin/dashboard" class="sidebar-link active"><span class="nav-icon">🌐</span> Global Metrics</a>
        <a routerLink="/superadmin/finance" class="sidebar-link"><span class="nav-icon">💰</span> Financial Control</a>
        <a routerLink="/superadmin/settings" class="sidebar-link"><span class="nav-icon">⚙️</span> System Config</a>
      </nav>
    </div>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <div class="topbar-left"><h1 class="topbar-title">Global Control Center</h1></div>
    </header>

    <div class="page-content">
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:24px;">
        <div class="card"><div class="stat-label">Total Active Users</div><div class="stat-value text-cyan">42.8K</div></div>
        <div class="card"><div class="stat-label">Matches Made (30d)</div><div class="stat-value text-pathfinder">8,405</div></div>
        <div class="card"><div class="stat-label">Platform ARR (Est)</div><div class="stat-value text-green">₹1.2Cr</div></div>
        <div class="card"><div class="stat-label">System Load</div><div class="stat-value text-amber">42%</div></div>
      </div>

      <div class="card animate-in">
        <h3 style="margin-bottom: 16px;">Live System Activity (Heatmap)</h3>
        <div style="height: 300px; background: linear-gradient(180deg, rgba(30,30,40,0.5) 0%, rgba(20,20,30,0.5) 100%); border-radius: 8px; border: 1px solid var(--border-default); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden;">
          <div style="position: absolute; top: 20%; left: 30%; width: 50px; height: 50px; background: radial-gradient(circle, rgba(16,185,129,0.8) 0%, rgba(16,185,129,0) 70%);"></div>
          <div style="position: absolute; top: 50%; left: 60%; width: 80px; height: 80px; background: radial-gradient(circle, rgba(14,165,233,0.8) 0%, rgba(14,165,233,0) 70%);"></div>
          <div style="position: absolute; top: 70%; left: 20%; width: 40px; height: 40px; background: radial-gradient(circle, rgba(239,68,68,0.8) 0%, rgba(239,68,68,0) 70%);"></div>
          <div style="position: absolute; top: 30%; left: 80%; width: 60px; height: 60px; background: radial-gradient(circle, rgba(245,158,11,0.8) 0%, rgba(245,158,11,0) 70%);"></div>
          <span style="color: var(--text-secondary); font-size: 14px; z-index: 1;">[Live Geo-Distribution Map Mock]</span>
        </div>
      </div>
    </div>
  </main>
</div>
